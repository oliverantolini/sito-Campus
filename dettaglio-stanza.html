<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Dettaglio Stanza | Campus Rimini House</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #3b82f6; --dark-bg: #0f172a; --card-bg: #1e293b; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: white; margin: 0; }
        header { padding: 20px 8%; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 40px 8%; max-width: 1000px; margin: auto; }
        .back-link { color: var(--primary); text-decoration: none; font-weight: bold; }
        .lang-switch { border: 1px solid var(--primary); color: var(--primary); padding: 4px 10px; border-radius: 6px; text-decoration: none; font-weight: 800; }
        .photo-gallery { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; margin-top: 30px; }
        .main-photo { width: 100%; height: 400px; background: #334155; border-radius: 15px; object-fit: cover; }
        .side-photos { display: grid; grid-template-rows: 1fr 1fr; gap: 15px; }
        .side-photo { width: 100%; height: 192px; background: #334155; border-radius: 15px; object-fit: cover; }
        .description { background: var(--card-bg); padding: 30px; border-radius: 20px; margin-top: 30px; border: 1px solid #334155; }
    </style>
</head>
<body>
<header>
    <div style="font-weight: 800; color: #3b82f6;">CAMPUS RIMINI</div>
    <div style="display: flex; gap: 20px; align-items: center;">
        <a href="index.html" class="back-link">← Home</a>
        <a id="en-link" href="dettaglio-stanza-en.html" class="lang-switch">EN</a>
    </div>
</header>

<div class="container">
    <h1 id="page-title">Galleria e Dettagli Alloggio</h1>
    <div class="photo-gallery">
        <img id="img-main" src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=800&q=80" class="main-photo">
        <div class="side-photos">
            <img id="img-side-1" src="https://images.unsplash.com/photo-1598928506311-c55ded91a20c?auto=format&fit=crop&w=400&q=80" class="side-photo">
            <img id="img-side-2" src="https://images.unsplash.com/photo-1554995207-c18c203602cb?auto=format&fit=crop&w=400&q=80" class="side-photo">
        </div>
    </div>
    <div class="description">
        <h2 id="room-title">Caratteristiche della Stanza</h2>
        <ul id="features-list">
            <li>Letto 90x200</li>
            <li>Grande armadio</li>
            <li>Scrivania 160cm</li>
            <li>Wi-Fi</li>
            <li>Aria Condizionata</li>
        </ul>
    </div>
</div>

<script>
    // 1. Configurazione dei dati per ogni tipo di stanza
    const roomData = {
        'singola': {
            title: "Caratteristiche della Stanza Singola",
            images: [
                "https://images.unsplash.com/photo-1522771739844-6a9f6d5f14af?auto=format&fit=crop&w=800&q=80", // Main
                "https://images.unsplash.com/photo-1559599101-f09722fb4948?auto=format&fit=crop&w=400&q=80", // Side 1
                "https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=400&q=80"  // Side 2
            ]
        },
        'doppia': {
            title: "Caratteristiche della Stanza Doppia",
            images: [
                "https://images.unsplash.com/photo-1522708323590-d24dbb6b0267?auto=format&fit=crop&w=800&q=80", // Main
                "https://images.unsplash.com/photo-1598928506311-c55ded91a20c?auto=format&fit=crop&w=400&q=80", // Side 1
                "https://images.unsplash.com/photo-1554995207-c18c203602cb?auto=format&fit=crop&w=400&q=80"  // Side 2
            ]
        }
    };

    // 2. Lettura del parametro URL
    const urlParams = new URLSearchParams(window.location.search);
    const type = urlParams.get('type');
    
    // 3. Selezione degli elementi DOM
    const titleElement = document.getElementById('room-title');
    const enLink = document.getElementById('en-link');
    const imgMain = document.getElementById('img-main');
    const imgSide1 = document.getElementById('img-side-1');
    const imgSide2 = document.getElementById('img-side-2');

    // 4. Aggiornamento dinamico dei contenuti
    if (type && roomData[type]) {
        // Aggiorna Titolo
        titleElement.innerText = roomData[type].title;
        
        // Aggiorna Immagini
        imgMain.src = roomData[type].images[0];
        imgSide1.src = roomData[type].images[1];
        imgSide2.src = roomData[type].images[2];
        
        // Mantiene il tipo nel cambio lingua
        enLink.href = "dettaglio-stanza-en.html?type=" + type;
    }
</script>
</body>
</html>
