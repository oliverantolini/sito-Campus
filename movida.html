<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Movida | Campus Rimini</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Sincronizzato con libri.html */
        :root { 
            --neon: #ff007a; 
            --dark-bg: #0f172a; 
            --primary: #3b82f6; 
            --card-bg: #1e293b; 
        }
        
        body { font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: white; margin: 0; }
        
        /* Header identico a libri.html */
        header { 
            padding: 20px 8%; 
            border-bottom: 1px solid #334155; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        
        .container { padding: 40px 8%; text-align: center; }

        /* Card rivisitata per coerenza */
        .event-card { 
            background: var(--card-bg);
            border: 2px solid var(--neon); 
            padding: 30px; 
            border-radius: 20px; 
            display: inline-block; 
            box-shadow: 0 0 15px var(--neon); 
        }

        nav a { color: white; text-decoration: none; }
        nav a:hover { color: var(--primary); }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800; color: #3b82f6;">CAMPUS RIMINI</div>
    <nav>
        <a href="index.html">Torna alla Home</a>
    </nav>
</header>

<div class="container">
    <h1 style="color: var(--neon); margin-bottom: 30px;">RIMINI UNIVERSITY NIGHT</h1>
    
    <div class="event-card">
        <h3 style="margin-top: 0;">Mercoledì Universitario</h3>
        <p>Sconti con Badge UniBo in tutti i locali del centro!</p>
        <p><strong>Ogni Mercoledì dalle 22:00</strong></p>
    </div>
</div>

</body>
</html>
